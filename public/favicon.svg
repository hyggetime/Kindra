<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Kindra favicon: sage green rounded square + K lettermark -->
  <rect width="32" height="32" rx="8" fill="#7C9070"/>
  <!-- K lettermark via strokes (path-based for crisp rendering at small sizes) -->
  <g stroke="#FDFBF9" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="10.5" y1="8" x2="10.5" y2="24"/>
    <line x1="10.5" y1="16" x2="21" y2="8"/>
    <line x1="10.5" y1="16" x2="21" y2="24"/>
  </g>
</svg>
