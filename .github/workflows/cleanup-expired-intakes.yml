name: Cleanup expired intakes

# 매일 12:00·00:00 한국시간(KST) — GitHub schedule 은 UTC (03:00 = 정오 KST, 15:00 = 자정 KST)
# Repository Secrets: NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Vercel Cron 과 동시 사용 시 같은 DB 에 하루 4회 실행되므로 한쪽만 쓰는 것을 권장합니다.

on:
  schedule:
    # 12:00 KST (UTC+9) — GitHub cron 은 UTC 기준
    - cron: '0 3 * * *'
    # 00:00 KST (자정)
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run cleanup
        run: npm run cleanup:expired-intakes
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
