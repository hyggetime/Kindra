name: Cleanup expired intakes

# 스케줄은 항상 저장소 기본 브랜치의 UTC cron 입니다.
# - 0 3 * * *  → 매일 03:00 UTC = 한국 표준시(KST) 12:00 (정오)
# - 0 15 * * * → 매일 15:00 UTC = KST 00:00 (다음날 자정)
# 실제 실행은 GitHub 부하 등으로 수 분~수십 분(또는 그 이상) 지연될 수 있습니다(늦게 도는 경우가 많음).
#
# Repository Secrets: NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Vercel Cron 과 동시 사용 시 같은 DB 에 하루 4회 실행되므로 한쪽만 쓰는 것을 권장합니다.
#
# npm ci 실패( lock 과 package.json 불일치 ) 시: 로컬에서 `npm install` 후 package-lock.json 커밋.

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  group: cleanup-expired-intakes-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: Run cleanup
        run: npm run cleanup:expired-intakes
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
